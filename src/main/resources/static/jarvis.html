<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8"/>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0"/>

    <title>JARVIS AI Assistant</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link
            href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
            rel="stylesheet"
    />

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:
                    radial-gradient(
                            circle at center,
                            #04314b 0%,
                            #011724 35%,
                            #00080f 100%
                    );

            min-height:100vh;

            overflow-x:hidden;

            color:#d7ffe4;

            font-family:'Orbitron',sans-serif;
        }

        body::before{

            content:"";

            position:fixed;

            inset:0;

            background-image:
                    radial-gradient(
                            rgba(255,255,255,0.9) 1px,
                            transparent 1px
                    ),

                    radial-gradient(
                            #437512 1px,
                            transparent 1px
                    );

            background-size:
                    140px 140px,
                    220px 220px;

            opacity:0.14;

            animation:
                    starsMove 120s linear infinite;

            pointer-events:none;
        }

        @keyframes starsMove{

            from{
                transform:translateY(0px);
            }

            to{
                transform:translateY(-400px);
            }
        }

        .main-wrapper{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;
        }

        .jarvis-card{

            width:100%;
            max-width:950px;

            background:
                    rgba(0,25,38,0.78);

            backdrop-filter:blur(14px);

            border:
                    1px solid rgba(67,117,18,0.28);

            border-radius:28px;

            box-shadow:
                    0 0 30px rgba(67,117,18,0.16),
                    0 0 120px rgba(0,41,62,0.35),
                    inset 0 0 30px rgba(67,117,18,0.06);

            padding:40px;

            position:relative;

            overflow:hidden;
        }

        .jarvis-card::before{

            content:"";

            position:absolute;

            inset:0;

            background:
                    linear-gradient(
                            90deg,
                            transparent,
                            rgba(67,117,18,0.08),
                            transparent
                    );

            animation:
                    scanline 5s linear infinite;
        }

        @keyframes scanline{

            0%{
                transform:translateX(-100%);
            }

            100%{
                transform:translateX(100%);
            }
        }

        .title{

            text-align:center;

            font-size:38px;

            font-weight:700;

            letter-spacing:4px;

            margin-bottom:10px;

            color:#8ee84b;

            text-shadow:
                    0 0 10px #437512,
                    0 0 30px rgba(67,117,18,0.75);
        }

        .subtitle{

            text-align:center;

            color:#7ea47b;

            margin-bottom:35px;

            font-size:14px;

            letter-spacing:2px;
        }

        .core-wrapper{

            display:flex;

            justify-content:center;

            align-items:center;

            margin-bottom:40px;
        }

        .core{

            width:240px;
            height:240px;

            position:relative;

            border-radius:50%;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .ring{

            position:absolute;

            border-radius:50%;

            border:
                    2px solid rgba(67,117,18,0.35);

            box-shadow:
                    0 0 20px rgba(67,117,18,0.16),
                    inset 0 0 12px rgba(67,117,18,0.12);
        }

        .ring1{

            width:240px;
            height:240px;

            animation:
                    rotateClockwise 12s linear infinite;
        }

        .ring2{

            width:200px;
            height:200px;

            border-style:dashed;

            animation:
                    rotateAnti 10s linear infinite;
        }

        .ring3{

            width:160px;
            height:160px;

            animation:
                    pulse 3s ease-in-out infinite;
        }

        .center-orb{

            width:80px;
            height:80px;

            border-radius:50%;

            background:
                    radial-gradient(
                            circle,
                            #d9ffbf 0%,
                            #437512 35%,
                            #081707 100%
                    );

            box-shadow:
                    0 0 25px #437512,
                    0 0 80px rgba(67,117,18,0.55),
                    0 0 150px rgba(67,117,18,0.22),
                    inset 0 0 20px rgba(255,255,255,0.7);

            animation:
                    orbIdle 4s ease-in-out infinite;
        }

        .core.idle .center-orb{

            animation:
                    orbIdle 4s ease-in-out infinite;
        }

        .core.listening .center-orb{

            animation:
                    listeningPulse 1s ease-in-out infinite;
        }

        .core.processing .center-orb{

            animation:
                    processingPulse 1.2s linear infinite;
        }

        .core.speaking .center-orb{

            animation:
                    speakingPulse 0.6s ease-in-out infinite;
        }

        .core.speaking .ring1,
        .core.speaking .ring2{

            animation-duration:3s;
        }

        .core.listening .ring1,
        .core.listening .ring2{

            animation-duration:5s;
        }

        .core.processing .ring1,
        .core.processing .ring2{

            animation-duration:1.5s;
        }

        @keyframes rotateClockwise{

            from{
                transform:rotate(0deg);
            }

            to{
                transform:rotate(360deg);
            }
        }

        @keyframes rotateAnti{

            from{
                transform:rotate(360deg);
            }

            to{
                transform:rotate(0deg);
            }
        }

        @keyframes pulse{

            0%,100%{
                transform:scale(1);
                opacity:0.5;
            }

            50%{
                transform:scale(1.08);
                opacity:1;
            }
        }

        @keyframes orbIdle{

            0%,100%{
                transform:scale(1);
            }

            50%{
                transform:scale(1.05);
            }
        }

        @keyframes listeningPulse{

            0%,100%{

                transform:scale(1);

                box-shadow:
                        0 0 25px #437512,
                        0 0 80px rgba(67,117,18,0.45);
            }

            50%{

                transform:scale(1.25);

                box-shadow:
                        0 0 45px #437512,
                        0 0 140px rgba(67,117,18,0.95),
                        0 0 220px rgba(67,117,18,0.35);
            }
        }

        @keyframes processingPulse{

            0%{
                transform:rotate(0deg) scale(1);
            }

            50%{
                transform:rotate(180deg) scale(1.18);
            }

            100%{
                transform:rotate(360deg) scale(1);
            }
        }

        @keyframes speakingPulse{

            0%,100%{
                transform:scale(1);
            }

            25%{
                transform:scale(1.35);
            }

            50%{

                transform:scale(1.12);

                box-shadow:
                        0 0 60px rgba(67,117,18,0.9);
            }

            75%{
                transform:scale(1.4);
            }
        }

        .status-box{

            text-align:center;

            margin-bottom:30px;
        }

        .status-text{

            font-size:18px;

            letter-spacing:2px;

            color:#9cff7a;

            text-shadow:
                    0 0 10px #437512,
                    0 0 25px rgba(67,117,18,0.6);
        }

        .panel{

            background:
                    rgba(0,8,20,0.72);

            border:
                    1px solid rgba(67,117,18,0.18);

            border-radius:20px;

            padding:22px;

            margin-bottom:25px;

            box-shadow:
                    inset 0 0 20px rgba(67,117,18,0.06);
        }

        .panel-title{

            color:#8ee84b;

            font-size:16px;

            letter-spacing:2px;

            margin-bottom:15px;

            text-transform:uppercase;
        }

        .panel-content{

            color:#dfffd0;

            line-height:1.7;

            white-space:pre-wrap;

            min-height:90px;
        }

        .footer-note{

            margin-top:25px;

            text-align:center;

            font-size:12px;

            color:#6f936b;

            letter-spacing:1px;
        }

        @media(max-width:768px){

            .jarvis-card{
                padding:25px;
            }

            .title{
                font-size:28px;
            }

            .core{
                width:190px;
                height:190px;
            }

            .ring1{
                width:190px;
                height:190px;
            }

            .ring2{
                width:150px;
                height:150px;
            }

            .ring3{
                width:120px;
                height:120px;
            }
        }

    </style>

</head>

<body>

<div class="main-wrapper">

    <div class="jarvis-card">

        <div class="title">
            J.A.R.V.I.S
        </div>

        <div class="subtitle">
            JUST A RATHER VERY INTELLIGENT SYSTEM
        </div>

        <div class="core-wrapper">

            <div class="core idle"
                 id="jarvisCore">

                <div class="ring ring1"></div>
                <div class="ring ring2"></div>
                <div class="ring ring3"></div>

                <div class="center-orb"></div>

            </div>

        </div>

        <div class="status-box">

            <div class="status-text"
                 id="status">

                VOICE ACTIVATION READY

            </div>

        </div>

        <div class="panel">

            <div class="panel-title">
                JARVIS RESPONSE
            </div>

            <div class="panel-content"
                 id="jarvisResponse">

                Awaiting voice input...

            </div>

        </div>

        <div class="footer-note">
            FUTURISTIC AI VOICE INTERFACE • ONLINE
        </div>

    </div>

</div>

<script>

    let mediaRecorder;
    let audioChunks = [];

    let silenceTimer;

    let isRecording = false;
    let isProcessing = false;

    let audioContext;
    let analyser;
    let microphone;
    let dataArray;
    let stream;

    const statusEl =
        document.getElementById("status");

    const jarvisResponseEL =
        document.getElementById("jarvisResponse");

    const jarvisCore =
        document.getElementById("jarvisCore");

    function setJarvisMode(mode){

        jarvisCore.classList.remove(
            "idle",
            "listening",
            "processing",
            "speaking"
        );

        jarvisCore.classList.add(mode);
    }

    async function startVoiceDetection(){

        try{

            stream =
                await navigator.mediaDevices
                    .getUserMedia({
                        audio:true
                    });

            audioContext =
                new AudioContext();

            analyser =
                audioContext.createAnalyser();

            microphone =
                audioContext
                    .createMediaStreamSource(stream);

            microphone.connect(analyser);

            analyser.fftSize = 512;

            const bufferLength =
                analyser.frequencyBinCount;

            dataArray =
                new Uint8Array(bufferLength);

            monitorVoice();

            statusEl.textContent =
                "VOICE ACTIVATION READY";

        }
        catch(err){

            console.error(err);

            statusEl.textContent =
                "MICROPHONE ACCESS DENIED";
        }
    }

    function monitorVoice(){

        if(isProcessing){

            requestAnimationFrame(
                monitorVoice
            );

            return;
        }

        analyser.getByteFrequencyData(
            dataArray
        );

        let volume =
            dataArray.reduce(
                (a,b)=>a+b,
                0
            ) / dataArray.length;

        if(volume > 18){

            if(!isRecording){

                startRecording();
            }

            clearTimeout(
                silenceTimer
            );

            silenceTimer =
                setTimeout(()=>{

                    if(isRecording){

                        stopRecording();
                    }

                },1800);
        }

        requestAnimationFrame(
            monitorVoice
        );
    }

    function startRecording(){

        mediaRecorder =
            new MediaRecorder(stream);

        audioChunks = [];

        mediaRecorder.ondataavailable =
            event => {

                audioChunks.push(
                    event.data
                );
            };

        mediaRecorder.onstop =
            sendAudio;

        mediaRecorder.start();

        isRecording = true;

        statusEl.textContent =
            "LISTENING...";

        jarvisResponseEL.textContent =
            "Listening to user voice input...";

        setJarvisMode(
            "listening"
        );
    }

    function stopRecording(){

        if(!mediaRecorder) return;

        mediaRecorder.stop();

        isRecording = false;

        isProcessing = true;

        statusEl.textContent =
            "PROCESSING REQUEST...";

        jarvisResponseEL.textContent =
            "Analyzing speech and generating response...";

        setJarvisMode(
            "processing"
        );
    }

    function decodeHeader(value){

        return decodeURIComponent(
            (value || "")
                .replace(/\+/g," ")
        );
    }
    function playBase64Audio(base64){

        const audio =
            new Audio(
                "data:audio/mp3;base64," + base64
            );

        audio.play();

        audio.onended = ()=>{

            statusEl.textContent =
                "VOICE ACTIVATION READY";

            setJarvisMode("idle");

            isProcessing = false;
        };
    }

    async function sendAudio(){

        const audioBlob =
            new Blob(
                audioChunks,
                {
                    type:"audio/webm"
                }
            );

        const formData =
            new FormData();

        formData.append(
            "file",
            audioBlob,
            "recording.webm"
        );

        try{

            const response =
                await fetch(
                    "/ai/chat/audio/voice",
                    {
                        method:"POST",
                        body:formData
                    }
                );

            if(!response.ok){

                statusEl.textContent =
                    "SYSTEM ERROR";

                jarvisResponseEL.textContent =
                    "Failed to process request.";

                isProcessing = false;

                setJarvisMode("idle");

                return;
            }

            /* =========================
               READ HEADERS
            ========================== */

            const transcript =
                decodeHeader(
                    response.headers
                        .get("X-Transcript") || ""
                );

            const aiResponse =
                decodeHeader(
                    response.headers
                        .get("X-AI-Response") || ""
                );

            console.log("Transcript:", transcript);
            console.log("AI Response:", aiResponse);

            /* =========================
               SHOW RESPONSE
            ========================== */

            jarvisResponseEL.textContent =
                aiResponse;

            statusEl.textContent =
                "AI SPEAKING...";

            setJarvisMode("speaking");

            /* =========================
               READ AUDIO BODY
            ========================== */

            const audioBase64 =
                await response.text();

            playBase64Audio(audioBase64);

        }
        catch(err){

            console.error(err);

            statusEl.textContent =
                "REQUEST FAILED";

            jarvisResponseEL.textContent =
                "Unable to contact AI server.";

            isProcessing = false;

            setJarvisMode("idle");
        }
    }

    window.onload = ()=>{

        startVoiceDetection();
    };

</script>

</body>

</html>
